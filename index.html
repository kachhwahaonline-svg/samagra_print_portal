<!DOCTYPE html>
<html>

<head>

<title>Samagra Print Portal - Govt</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="header">

<div class="logo">MP</div>

<div class="title">
<h1>Samagra Print Portal</h1>
<p>Government of Madhya Pradesh</p>
</div>

<div class="header-menu">
<button class="admin-btn" onclick="openAdmin()">Admin Login</button>

</div>
</div>

</div>


<div class="login-container">

<div class="login-box">

<h2>Operator Login</h2>

<input type="text" id="operatorid" placeholder="Enter Operator ID">

<input type="text" id="username" placeholder="Enter Operator Name">

<input type="password" id="password" placeholder="Enter Password">

<button onclick="login()">Login</button>
<p class="footer">Authorized Access Only</p>

</div>

</div>


<script src="script.js"></script>

</body>
</html>
